- name: Output hello message
  debug:
    msg: "Hello, I'm going to install {{ apache_pkg }}"

- name: Install apache package
  ansible.builtin.package:
    name: "{{ apache_pkg }}"
    state: present
    # update_cache: yes
  
- name: Start apache service
  service:
    name: "{{ apache_svc }}"
    state: started
    enabled: true

- name: Allow HTTP in firewall
  ansible.builtin.firewalld:
    service: http
    permanent: true
    state: enabled
    immediate: true
  when: ansible_os_family == "RedHat"
  ignore_errors: true
  
- name: Set SELinux to permissive
  ansible.posix.selinux:
    policy: targeted
    state: permissive
  when: ansible_os_family == "RedHat"
  ignore_errors: true

- name: Create Apache Config
  ansible.builtin.template:
    src: apache.conf.j2
    dest: "{{ apache_cfg_dir }}/{{ apache_cfg }}"
    owner: root
    group: root
    mode: '0644'
  notify: Restart apache


- name: Enable Apache site
  ansible.builtin.command: a2ensite {{ apache_cfg }}
  args:
    creates: "/etc/apache2/sites-enabled/{{ apache_cfg }}"
  when: ansible_os_family == "Debian"
  notify: Restart apache